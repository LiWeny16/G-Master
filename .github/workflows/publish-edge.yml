name: Publish Edge Add-on

on:
  workflow_dispatch:
    inputs:
      upload_only:
        description: Only upload draft package (do not submit publish)
        required: false
        default: false
        type: boolean
      notes_for_certification:
        description: Optional notes shown to Edge reviewers
        required: false
        type: string
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  publish-edge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Pack extension zip
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/edge-extension.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-extension-zip
          path: release/edge-extension.zip

      - name: Publish to Edge Add-ons (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: release/edge-extension.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          upload-only: ${{ inputs.upload_only }}
          notes-for-certification: ${{ inputs.notes_for_certification }}

      - name: Publish to Edge Add-ons (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: release/edge-extension.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          notes-for-certification: ${{ secrets.EDGE_NOTES_FOR_CERTIFICATION }}
